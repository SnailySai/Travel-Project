      padding: 0;
      box-sizing: border-box;

      justify-content: center;
      padding: 2rem 1.5rem;
      margin: 0;
      transition: background 0.3s ease, background-image 0.3s ease;
    }

    .generator-card {

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #b86b9b;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      text-shadow: 2px 2px 0 rgba(255, 210, 235, 0.7);

      border-radius: 4rem;
      font-weight: 700;
      color: #7d4b75;
    }
    .subtitle {

      font-weight: 600;
      color: #b884aa;
      margin-bottom: 2.2rem;
      border-bottom: 2px dashed #e0b8d8;
      display: inline-block;
      padding-bottom: 0.5rem;
      padding-left: 0.8rem;

      margin: 1rem 0 2.8rem;
      border: 2px solid #fcd9f0;
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      backdrop-filter: blur(6px);
      text-shadow: 0 1px 2px rgba(255,240,250,0.8);
    }
    .btn-generate:hover {
      background: linear-gradient(145deg, #fad4ef, #f0bde2);
      box-shadow: 0 22px 34px rgba(185, 100, 165, 0.4);
      transform: translateY(-4px);
      border-color: #f7c0e5;
      color: #45203a;
    }
    .btn-generate:active {
      transform: translateY(2px);
      box-shadow: 0 9px 18px rgba(160, 80, 130, 0.5);
    }

    .result-box {
      background: #fef7fd;
      border-radius: 2.8rem;
      padding: 2.2rem 2rem 2.4rem;
      margin-top: 1.5rem;
      background: #ffffffec;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 2px solid #f2d2eb;
      box-shadow: inset 0 1px 10px rgba(245, 210, 235, 0.8), 0 18px 28px rgba(150, 90, 140, 0.14);
      transition: all 0.25s;
      min-height: 230px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .country-name {
      font-size: 2.4rem;
      font-weight: 700;
      color: #a1588a;
      background: #fae3f5;
      display: inline-block;
      padding: 0.4rem 2.6rem;
      border-radius: 3rem;
      margin-bottom: 1.6rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      box-shadow: 0 8px 16px rgba(200, 130, 180, 0.22);
      border: 1px solid #eeb5da;
    }

    .place-heading {
      font-size: 2.1rem;
      font-weight: 700;
      color: #65415b;
      margin-bottom: 0.8rem;
      line-height: 1.3;
      word-break: break-word;
    }

    .must-try-desc {
      font-size: 1.3rem;
      font-weight: 500;
      color: #7b5272;
      background: #fef1fa;
      padding: 1rem 2rem;
      border-radius: 2.8rem;
      display: inline-block;
      max-width: 90%;
      margin: 0.3rem auto 0;
      line-height: 1.5;
      border: 1px dashed #dba3ca;
      font-style: normal;
      box-shadow: 0 3px 10px rgba(210, 140, 180, 0.25);
    }

    .placeholder-message {
      color: #cc9dbe;
      font-size: 1.45rem;
      font-weight: 500;
      opacity: 0.85;
    }

    hr {
      display: none;
    }

    @media (max-width: 550px) {
      .generator-card {
        padding: 2rem 1.3rem;
      }
      .btn-generate {
        font-size: 1.8rem;
        padding: 1.3rem 2.5rem;
      }
      .country-name {
        font-size: 1.9rem;
      }
      .place-heading {
        font-size: 1.7rem;
      }
    }
  </style>
</head>

      const generateBtn = document.getElementById('generateBtn');
      const resultContainer = document.getElementById('resultContainer');

      function getRandomDestination() {
        const randomIndex = Math.floor(Math.random() * DESTINATIONS.length);
        return DESTINATIONS[randomIndex];
      }

      function renderDestination(dest) {
        if (!dest) return;
        resultContainer.innerHTML = `
          <div class="country-name">${dest.country}</div>
          <div class="place-heading">${dest.place}</div>
          <div class="must-try-desc">✨ ${dest.desc} ✨</div>
        `;
      }

      function generateNewPlace() {
        const newDest = getRandomDestination();
        renderDestination(newDest);
        resultContainer.style.transform = 'scale(1.02)';
        setTimeout(() => {
          if (resultContainer) resultContainer.style.transform = 'scale(1)';
        }, 150);
      }

      generateBtn.addEventListener('click', generateNewPlace);

      window.addEventListener('load', () => {
        setTimeout(() => {
          generateNewPlace();
        }, 200);
      });
